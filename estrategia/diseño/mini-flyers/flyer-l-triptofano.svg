<svg width="100mm" height="70mm" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="70" fill="#FFFFFF"/>
  <rect width="100" height="70" fill="none" stroke="#E8E8E8" stroke-width="0.4"/>
  <rect width="100" height="3" fill="#4A6FA5"/>
  <rect x="4" y="6" width="22" height="5" rx="2" fill="#EEF2F8"/>
  <text x="15" y="9.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.5" fill="#4A6FA5" text-anchor="middle" font-weight="600">ESTRÉS</text>
  <text x="4" y="22" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="800" fill="#2C2C2C">L-Triptófano</text>
  <text x="4" y="30" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="5.5" fill="#4A6FA5" font-weight="600">Para sueño roto con ansiedad nocturna</text>
  <line x1="4" y1="33" x2="96" y2="33" stroke="#E8E8E8" stroke-width="0.5"/>
  <text x="4" y="39" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">Precursor de serotonina y melatonina. Apoya</text>
  <text x="4" y="44.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">el ciclo de sueño cuando hay ansiedad activa</text>
  <text x="4" y="50" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">o el estado de ánimo está bajo.</text>
  <text x="4" y="55.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.5" fill="#C44A4A" font-weight="600">Consultar si hay antidepresivos activos.</text>
  <text x="4" y="62" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.5" fill="#888888">Ingrediente principal:</text>
  <text x="4" y="66" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.8" fill="#2C2C2C" font-weight="600">L-Triptofano · aminoácido esencial</text>
</svg>