<svg width="148mm" height="210mm" viewBox="0 0 148 210" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo blanco -->
  <rect width="148" height="210" fill="#FFFFFF"/>
  <rect width="148" height="210" fill="none" stroke="#E8E8E8" stroke-width="0.4"/>
  <!-- Bloque superior -->
  <rect width="148" height="6" fill="#4A6FA5"/>
  <!-- Header -->
  <text x="74" y="17" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="5" fill="#888888" text-anchor="middle" font-weight="600" letter-spacing="2">¿CUÁL ES TU PATRÓN?</text>
  <text x="74" y="26" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle" font-weight="800">Estrés</text>
  <text x="74" y="33" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4A6FA5" text-anchor="middle" font-weight="400" letter-spacing="0.5">Identifica dónde se queda el estrés en tu cuerpo</text>
  <line x1="20" y1="37" x2="128" y2="37" stroke="#E8E8E8" stroke-width="0.5"/>

  <!-- PATRÓN 1 — Tensión -->
  <rect x="8" y="42" width="132" height="38" rx="4" fill="#F5F8FC"/>
  <rect x="8" y="42" width="5" height="38" rx="3" fill="#4A6FA5"/>
  <text x="18" y="53" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="7" fill="#2C2C2C" font-weight="800">Patrón 1 · Tensión</text>
  <text x="18" y="61" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">El cuerpo sigue apretado aunque el problema terminó.</text>
  <text x="18" y="67" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">Mandíbula, hombros, cuello o espalda que no sueltan.</text>
  <text x="18" y="75" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.8" fill="#4A6FA5" font-weight="600">→ Ner-vit</text>

  <!-- PATRÓN 2 — Ruido mental -->
  <rect x="8" y="85" width="132" height="38" rx="4" fill="#F5F8FC"/>
  <rect x="8" y="85" width="5" height="38" rx="3" fill="#4A6FA5"/>
  <text x="18" y="96" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="7" fill="#2C2C2C" font-weight="800">Patrón 2 · Ruido mental</text>
  <text x="18" y="104" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">La cabeza no para aunque el cuerpo ya descansó.</text>
  <text x="18" y="110" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">Pensamientos en loop, repasa conversaciones, planea.</text>
  <text x="18" y="118" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.8" fill="#4A6FA5" font-weight="600">→ Valeriana</text>

  <!-- PATRÓN 3 — Sueño roto -->
  <rect x="8" y="128" width="132" height="38" rx="4" fill="#F5F8FC"/>
  <rect x="8" y="128" width="5" height="38" rx="3" fill="#4A6FA5"/>
  <text x="18" y="139" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="7" fill="#2C2C2C" font-weight="800">Patrón 3 · Sueño roto</text>
  <text x="18" y="147" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">Se acuesta cansado pero no logra bajar.</text>
  <text x="18" y="153" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">Despierta a las 2-3am, sueño ligero, amanece sin descanso.</text>
  <text x="18" y="161" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.8" fill="#4A6FA5" font-weight="600">→ Zapote Blanco + L-Triptófano</text>

  <!-- PATRÓN 4 — Cansancio acumulado -->
  <rect x="8" y="171" width="132" height="28" rx="4" fill="#F5F8FC"/>
  <rect x="8" y="171" width="5" height="28" rx="3" fill="#4A6FA5"/>
  <text x="18" y="182" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="7" fill="#2C2C2C" font-weight="800">Patrón 4 · Cansancio</text>
  <text x="18" y="190" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="4" fill="#4B4B4B">Empieza el día agotado. Energía baja que no mejora.</text>
  <text x="18" y="195" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.8" fill="#4A6FA5" font-weight="600">→ Diatonato 3</text>

  <!-- Footer CTA -->
  <text x="74" y="206" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="3.5" fill="#888888" text-anchor="middle">Escribe tu patrón al 55 7907 6626 · Wellkitt</text>
</svg>