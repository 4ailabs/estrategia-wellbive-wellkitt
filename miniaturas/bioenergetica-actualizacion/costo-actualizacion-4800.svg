    <text x="0" y="78" dominant-baseline="hanging" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900" fill="#262620">actualización</text>
    <text x="0" y="184" dominant-baseline="hanging" font-family="Inter, Helvetica, Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="5" fill="#0f6e56">INVERSIÓN TOTAL</text>
