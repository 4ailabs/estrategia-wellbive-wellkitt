<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2400" viewBox="0 0 1800 2400">
  <title>Character sheet — Mesa semanal Wellkitt</title>
  <desc>Hoja maestra de identidad, composición y producción Cricut para la mesa semanal Wellkitt de 121 por 60 por 74 centímetros.</desc>
  <defs>
    <style>
      .sans{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif}
      .title{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;font-weight:700;fill:#111c1a}
      .caps{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;font-weight:700;letter-spacing:3px;fill:#111c1a}
      .body{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;font-size:24px;fill:#4e5955}
      .small{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;font-size:20px;fill:#6c756f}
      .tiny{font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;font-size:17px;fill:#6c756f}
      .line{stroke:#d6d4cb;stroke-width:2}
      .cut{fill:none;stroke:#d54a42;stroke-width:3;stroke-dasharray:12 9}
      .safe{fill:none;stroke:#7bae7f;stroke-width:2;stroke-dasharray:7 7}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#111c1a" flood-opacity=".13"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="1800" height="2400" fill="#ede9df"/>
  <rect x="55" y="55" width="1690" height="2290" rx="22" fill="#f8f5ee"/>

  <!-- header -->
  <text x="105" y="130" class="caps" font-size="20">WELLKITT · SISTEMA DE EXHIBICIÓN</text>
  <text x="105" y="205" class="title" font-size="58">Character sheet — mesa semanal</text>
  <text x="105" y="252" class="body">Guía visual y de producción para Cricut · Mesa 121 × 60 × 74 cm</text>
  <rect x="1405" y="102" width="285" height="112" rx="4" fill="#111c1a"/>
  <text x="1548" y="165" class="sans" font-size="36" font-weight="700" text-anchor="middle" fill="#f6f1e8">wellkitt</text>
  <text x="1548" y="194" class="sans" font-size="15" text-anchor="middle" fill="#aab1ad">MESA SEMANAL · V1</text>
  <line x1="105" y1="300" x2="1695" y2="300" class="line"/>

  <!-- 01 identity -->
  <text x="105" y="360" class="caps" font-size="18">01 · PERSONALIDAD</text>
  <text x="105" y="420" class="title" font-size="40">Clínica cálida, clara y editorial</text>
  <g class="sans" font-size="22" font-weight="600" fill="#111c1a">
    <rect x="105" y="458" width="170" height="48" rx="24" fill="#ece7dd"/><text x="190" y="490" text-anchor="middle">CONFIABLE</text>
    <rect x="290" y="458" width="155" height="48" rx="24" fill="#ece7dd"/><text x="368" y="490" text-anchor="middle">SERENA</text>
    <rect x="460" y="458" width="170" height="48" rx="24" fill="#ece7dd"/><text x="545" y="490" text-anchor="middle">CERCANA</text>
    <rect x="645" y="458" width="178" height="48" rx="24" fill="#ece7dd"/><text x="734" y="490" text-anchor="middle">ORDENADA</text>
    <rect x="838" y="458" width="168" height="48" rx="24" fill="#ece7dd"/><text x="922" y="490" text-anchor="middle">PREMIUM</text>
  </g>
  <text x="105" y="552" class="body">Principio rector: una historia, cinco productos y una acción.</text>

  <!-- 02 palette -->
  <text x="105" y="630" class="caps" font-size="18">02 · PALETA BASE</text>
  <g class="sans">
    <g transform="translate(105 670)">
      <rect width="250" height="118" rx="8" fill="#111c1a"/>
      <text x="18" y="150" font-size="22" font-weight="700" fill="#111c1a">Grafito verde</text>
      <text x="18" y="179" font-size="20" fill="#6c756f">#111C1A · vinil mate</text>
    </g>
    <g transform="translate(390 670)">
      <rect width="250" height="118" rx="8" fill="#f6f1e8" stroke="#d8d5cc" stroke-width="2"/>
      <text x="18" y="150" font-size="22" font-weight="700" fill="#111c1a">Marfil clínico</text>
      <text x="18" y="179" font-size="20" fill="#6c756f">#F6F1E8 · base</text>
    </g>
    <g transform="translate(675 670)">
      <rect width="250" height="118" rx="8" fill="#6c756f"/>
      <text x="18" y="150" font-size="22" font-weight="700" fill="#111c1a">Salvia gris</text>
      <text x="18" y="179" font-size="20" fill="#6c756f">#6C756F · secundario</text>
    </g>
    <g transform="translate(960 670)">
      <rect width="250" height="118" rx="8" fill="#9b8ec4"/>
      <text x="18" y="150" font-size="22" font-weight="700" fill="#111c1a">Acento semanal</text>
      <text x="18" y="179" font-size="20" fill="#6c756f">Ejemplo CALMA</text>
    </g>
  </g>
  <rect x="1270" y="670" width="420" height="180" rx="8" fill="#eee9df"/>
  <text x="1300" y="713" class="title" font-size="23">Regla 70 / 20 / 10</text>
  <text x="1300" y="754" class="small">70% marfil · 20% grafito</text>
  <text x="1300" y="789" class="small">10% color de categoría</text>
  <text x="1300" y="827" class="tiny">El color cambia; la estructura permanece.</text>

  <!-- 03 typography -->
  <text x="105" y="940" class="caps" font-size="18">03 · VOZ TIPOGRÁFICA</text>
  <text x="105" y="1010" class="sans" font-size="68" font-weight="700" letter-spacing="-3" fill="#111c1a">wellkitt</text>
  <text x="105" y="1054" class="small">Wordmark: minúsculas · peso Bold · sin símbolos</text>
  <text x="675" y="998" class="sans" font-size="22" font-weight="700" letter-spacing="3" fill="#111c1a">ESTA SEMANA</text>
  <text x="675" y="1055" class="sans" font-size="51" font-weight="700" fill="#4a5fa5">CALMA</text>
  <text x="675" y="1100" class="sans" font-size="26" fill="#111c1a">Dormir también es recuperar</text>
  <rect x="1260" y="935" width="430" height="176" rx="8" fill="#eee9df"/>
  <text x="1290" y="978" class="title" font-size="23">Fuentes</text>
  <text x="1290" y="1018" class="small">Preferente: Avenir Next</text>
  <text x="1290" y="1053" class="small">Alternativa: Helvetica Neue</text>
  <text x="1290" y="1088" class="tiny">Cricut: usar una sans limpia equivalente.</text>

  <!-- 04 top view layout -->
  <text x="105" y="1210" class="caps" font-size="18">04 · COMPOSICIÓN FIJA · VISTA SUPERIOR</text>
  <g transform="translate(105 1260)" filter="url(#shadow)">
    <!-- 4 px per cm: 484 x 240 -->
    <rect width="968" height="480" rx="5" fill="#f6f1e8" stroke="#111c1a" stroke-width="5"/>
    <rect x="20" y="20" width="928" height="120" rx="4" fill="#ede8de"/>
    <rect x="344" y="28" width="280" height="104" rx="4" fill="#fff" stroke="#9b8ec4" stroke-width="4"/>
    <text x="484" y="71" class="caps" font-size="14" text-anchor="middle">CARTEL A3</text>
    <text x="484" y="102" class="small" text-anchor="middle">30 × 42 cm</text>

    <rect x="235" y="177" width="240" height="120" rx="4" fill="#e9e4da" stroke="#c8c5bd" stroke-width="2"/>
    <rect x="505" y="158" width="192" height="139" rx="4" fill="#e0dacf" stroke="#c8c5bd" stroke-width="2"/>
    <text x="355" y="235" class="title" font-size="20" text-anchor="middle">BASE BAJA</text>
    <text x="601" y="225" class="title" font-size="20" text-anchor="middle">BASE ALTA</text>
    <g fill="#fff" stroke="#d3d0c7" stroke-width="2">
      <circle cx="290" cy="280" r="27"/><circle cx="360" cy="270" r="27"/><circle cx="430" cy="280" r="27"/>
      <circle cx="555" cy="270" r="27"/><circle cx="625" cy="270" r="27"/>
    </g>

    <rect x="35" y="327" width="260" height="118" rx="4" fill="#fff" stroke="#9b8ec4" stroke-width="3"/>
    <text x="165" y="379" class="title" font-size="20" text-anchor="middle">TARJETA A5</text>
    <text x="165" y="410" class="small" text-anchor="middle">21 × 15 cm</text>
    <rect x="790" y="327" width="118" height="118" rx="4" fill="#fff" stroke="#9b8ec4" stroke-width="3"/>
    <text x="849" y="379" class="title" font-size="20" text-anchor="middle">QR</text>
    <text x="849" y="410" class="small" text-anchor="middle">10 × 15</text>
    <rect x="365" y="370" width="300" height="56" rx="28" fill="none" stroke="#7bae7f" stroke-width="3" stroke-dasharray="8 7"/>
    <text x="515" y="405" class="sans" font-size="18" font-weight="700" text-anchor="middle" fill="#7bae7f">ESPACIO VISUAL LIBRE</text>
  </g>
  <g class="sans" fill="#111c1a">
    <text x="589" y="1788" font-size="22" font-weight="700" text-anchor="middle">121 cm</text>
    <text x="1097" y="1510" font-size="22" font-weight="700" transform="rotate(-90 1097 1510)" text-anchor="middle">60 cm</text>
  </g>

  <!-- production pieces -->
  <text x="1160" y="1210" class="caps" font-size="18">05 · PIEZAS PARA CRICUT</text>
  <g transform="translate(1160 1252)">
    <rect width="530" height="488" rx="10" fill="#eee9df"/>
    <g class="sans">
      <text x="28" y="49" font-size="23" font-weight="700" fill="#111c1a">Kit permanente</text>
      <text x="28" y="93" class="small">01 · Faldón frontal — 70 × 20 cm</text>
      <text x="28" y="130" class="small">02 · Wordmark en vinil — 30 × 7 cm</text>
      <text x="28" y="167" class="small">03 · Descriptor — 25 × 2.5 cm</text>
      <text x="28" y="204" class="small">04 · Base baja — 30 × 15 × 4 cm</text>
      <text x="28" y="241" class="small">05 · Base alta — 24 × 15 × 8 cm</text>
      <text x="28" y="292" font-size="23" font-weight="700" fill="#111c1a">Kit intercambiable</text>
      <text x="28" y="336" class="small">06 · Cartel A3 — 30 × 42 cm</text>
      <text x="28" y="373" class="small">07 · Tarjeta A5 — 21 × 15 cm</text>
      <text x="28" y="410" class="small">08 · Tarjeta QR — 10 × 15 cm</text>
      <text x="28" y="447" class="small">09 · Oferta — 10 × 7 cm</text>
    </g>
  </g>

  <!-- 06 Cricut construction examples -->
  <text x="105" y="1870" class="caps" font-size="18">06 · CONSTRUCCIÓN Y CAPAS</text>
  <g transform="translate(105 1915)">
    <!-- front runner -->
    <rect width="690" height="270" rx="8" fill="#111c1a"/>
    <rect x="18" y="18" width="654" height="234" rx="3" class="safe"/>
    <text x="345" y="120" class="sans" font-size="66" font-weight="700" text-anchor="middle" fill="#f6f1e8">wellkitt</text>
    <text x="345" y="175" class="sans" font-size="27" text-anchor="middle" fill="#f6f1e8">Tema de la semana</text>
    <text x="345" y="310" class="small" text-anchor="middle">Faldón 70 × 20 cm · zona segura interior: 2 cm</text>
  </g>
  <g transform="translate(855 1915)">
    <rect width="390" height="270" rx="8" fill="#f6f1e8" stroke="#d5d2c9" stroke-width="2"/>
    <rect x="18" y="18" width="354" height="234" rx="3" class="safe"/>
    <path d="M0 190 Q95 145 195 190 T390 190 V270 H0Z" fill="#9b8ec4" opacity=".36"/>
    <path d="M0 212 Q95 167 195 212 T390 212 V270 H0Z" fill="#9b8ec4" opacity=".55"/>
    <text x="195" y="62" class="caps" font-size="13" text-anchor="middle">ESTA SEMANA</text>
    <text x="195" y="124" class="sans" font-size="43" font-weight="700" text-anchor="middle" fill="#4a5fa5">CALMA</text>
    <text x="195" y="160" class="sans" font-size="18" text-anchor="middle" fill="#111c1a">Dormir también es recuperar</text>
    <text x="195" y="310" class="small" text-anchor="middle">Cartel 30 × 42 cm · margen seguro: 1.5 cm</text>
  </g>
  <g transform="translate(1305 1915)">
    <rect width="385" height="270" rx="8" fill="#eee9df"/>
    <text x="25" y="43" class="title" font-size="22">Capas recomendadas</text>
    <g class="small">
      <circle cx="38" cy="85" r="10" fill="#d54a42"/><text x="62" y="93">Rojo: línea de corte</text>
      <circle cx="38" cy="125" r="10" fill="#7bae7f"/><text x="62" y="133">Verde: margen seguro</text>
      <circle cx="38" cy="165" r="10" fill="#111c1a"/><text x="62" y="173">Negro: vinil permanente</text>
      <circle cx="38" cy="205" r="10" fill="#9b8ec4"/><text x="62" y="213">Color: pieza semanal</text>
      <circle cx="38" cy="245" r="10" fill="#fff" stroke="#bbb"/><text x="62" y="253">Blanco: impresión y corte</text>
    </g>
  </g>

  <!-- rules footer -->
  <rect x="105" y="2255" width="1590" height="58" rx="5" fill="#111c1a"/>
  <text x="135" y="2293" class="sans" font-size="19" font-weight="700" fill="#f6f1e8">REGLAS:</text>
  <text x="250" y="2293" class="sans" font-size="19" fill="#f6f1e8">máximo 5 productos · 1 QR · 1 color semanal · acabado mate · sin íconos wellness genéricos · 25% de aire visual</text>
  <text x="105" y="2340" class="tiny">Archivo maestro vectorial. Antes de enviar a Cricut: convertir tipografías a contornos, unir formas por color y comprobar medidas en centímetros.</text>
</svg>
