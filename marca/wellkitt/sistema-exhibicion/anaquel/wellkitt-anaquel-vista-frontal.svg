<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1780" viewBox="0 0 1600 1780">
  <title>Wellkitt — sistema de anaquel, vista frontal</title>
  <desc>Propuesta frontal a escala para dos anaqueles de 121 y 91 centímetros de ancho, 235 centímetros de alto, con separación de 24 centímetros.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111c1a" flood-opacity=".16"/>
    </filter>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8da573"/>
      <stop offset="1" stop-color="#758c60"/>
    </linearGradient>
    <style>
      .font { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .caps { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-weight: 700; letter-spacing: 3px; }
      .small { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 15px; fill: #6c756f; }
      .measure { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 17px; font-weight: 600; fill: #f6f1e8; }
    </style>
  </defs>

  <!-- Environment -->
  <rect width="1600" height="1780" fill="#eee9df"/>
  <rect x="55" y="55" width="1490" height="1570" rx="24" fill="url(#wall)"/>
  <rect x="55" y="1565" width="1490" height="60" fill="#b99975"/>
  <path d="M55 1588H1545 M55 1612H1545" stroke="#aa8968" opacity=".55"/>

  <!-- Editorial heading -->
  <text x="115" y="120" class="caps" font-size="16" fill="#f6f1e8">SISTEMA DE EXHIBICIÓN · VISTA FRONTAL</text>
  <text x="115" y="158" class="font" font-size="21" fill="#f6f1e8" opacity=".8">Escala visual proporcional · medidas estructurales en centímetros</text>

  <!-- Overall brand header, split across real shelf widths -->
  <g filter="url(#shadow)">
    <rect x="175" y="210" width="605" height="92" rx="3" fill="#f6f1e8"/>
    <rect x="900" y="210" width="455" height="92" rx="3" fill="#f6f1e8"/>
  </g>
  <text x="215" y="270" class="font" font-size="57" font-weight="700" letter-spacing="-3" fill="#111c1a">wellkitt</text>
  <circle cx="730" cy="256" r="7" fill="#7bae7f"/>
  <text x="940" y="246" class="caps" font-size="14" fill="#111c1a">ENCUENTRA APOYO</text>
  <text x="940" y="275" class="font" font-size="22" font-weight="500" fill="#111c1a">según lo que sientes</text>

  <!-- Shelf structures: scale 5 px = 1 cm -->
  <!-- A1 x=175 width=605. A2 x=900 width=455. Gap=120. Total height=1175 -->
  <g id="structures" filter="url(#shadow)">
    <!-- inner bay backgrounds -->
    <rect x="200" y="327" width="555" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="200" y="557" width="555" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="200" y="787" width="555" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="200" y="1017" width="555" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="200" y="1247" width="555" height="205" fill="#f6f1e8" opacity=".96"/>

    <rect x="925" y="327" width="405" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="925" y="557" width="405" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="925" y="787" width="405" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="925" y="1017" width="405" height="205" fill="#f6f1e8" opacity=".96"/>
    <rect x="925" y="1247" width="405" height="205" fill="#f6f1e8" opacity=".96"/>

    <!-- shelf rails, 5 cm = 25 px -->
    <g fill="#191d1c">
      <rect x="175" y="302" width="605" height="25"/>
      <rect x="175" y="532" width="605" height="25"/>
      <rect x="175" y="762" width="605" height="25"/>
      <rect x="175" y="992" width="605" height="25"/>
      <rect x="175" y="1222" width="605" height="25"/>
      <rect x="175" y="1452" width="605" height="25"/>
      <rect x="175" y="302" width="25" height="1175"/>
      <rect x="755" y="302" width="25" height="1175"/>

      <rect x="900" y="302" width="455" height="25"/>
      <rect x="900" y="532" width="455" height="25"/>
      <rect x="900" y="762" width="455" height="25"/>
      <rect x="900" y="992" width="455" height="25"/>
      <rect x="900" y="1222" width="455" height="25"/>
      <rect x="900" y="1452" width="455" height="25"/>
      <rect x="900" y="302" width="25" height="1175"/>
      <rect x="1330" y="302" width="25" height="1175"/>
    </g>
    <g stroke="#343a38" stroke-width="2" opacity=".8">
      <path d="M175 306H780 M175 536H780 M175 766H780 M175 996H780 M175 1226H780 M175 1456H780"/>
      <path d="M900 306H1355 M900 536H1355 M900 766H1355 M900 996H1355 M900 1226H1355 M900 1456H1355"/>
    </g>
  </g>

  <!-- Category panels -->
  <g class="font">
    <!-- left -->
    <g transform="translate(218 347)">
      <rect width="246" height="62" rx="3" fill="#9b8ec4"/>
      <text x="21" y="39" font-size="27" font-weight="750" fill="#fff">CALMA</text>
      <text x="270" y="21" font-size="16" font-weight="650" fill="#111c1a">Para cuando no puedes</text>
      <text x="270" y="44" font-size="16" fill="#6c756f">apagar la mente.</text>
    </g>
    <g transform="translate(218 577)">
      <rect width="246" height="62" rx="3" fill="#4a6fa5"/>
      <text x="21" y="39" font-size="27" font-weight="750" fill="#fff">ESTRÉS</text>
      <text x="270" y="21" font-size="16" font-weight="650" fill="#111c1a">Para cuando el cuerpo</text>
      <text x="270" y="44" font-size="16" fill="#6c756f">sigue en alerta.</text>
    </g>
    <g transform="translate(218 807)">
      <rect width="246" height="62" rx="3" fill="#7bae7f"/>
      <text x="21" y="39" font-size="25" font-weight="750" fill="#fff">DIGESTIÓN</text>
      <text x="270" y="21" font-size="16" font-weight="650" fill="#111c1a">Para inflamación, pesadez</text>
      <text x="270" y="44" font-size="16" fill="#6c756f">o digestión irregular.</text>
    </g>
    <g transform="translate(218 1037)">
      <rect width="246" height="62" rx="3" fill="#e07b39"/>
      <text x="21" y="39" font-size="26" font-weight="750" fill="#fff">ENERGÍA</text>
      <text x="270" y="21" font-size="16" font-weight="650" fill="#111c1a">Para cansancio que</text>
      <text x="270" y="44" font-size="16" fill="#6c756f">no se resuelve.</text>
    </g>
    <g transform="translate(218 1267)">
      <rect width="246" height="62" rx="3" fill="#c4715a"/>
      <text x="21" y="39" font-size="27" font-weight="750" fill="#fff">DOLOR</text>
      <text x="270" y="21" font-size="16" font-weight="650" fill="#111c1a">Para recuperar movimiento</text>
      <text x="270" y="44" font-size="16" fill="#6c756f">y bienestar físico.</text>
    </g>

    <!-- right -->
    <g transform="translate(943 347)">
      <rect width="178" height="62" rx="3" fill="#c47fa0"/>
      <text x="17" y="39" font-size="23" font-weight="750" fill="#fff">HORMONAS</text>
      <text x="198" y="21" font-size="15" font-weight="650" fill="#111c1a">Ciclo y equilibrio</text>
      <text x="198" y="43" font-size="15" fill="#6c756f">emocional.</text>
    </g>
    <g transform="translate(943 577)">
      <rect width="178" height="62" rx="3" fill="#4a9e9b"/>
      <text x="17" y="39" font-size="25" font-weight="750" fill="#fff">PESO</text>
      <text x="198" y="21" font-size="15" font-weight="650" fill="#111c1a">Metabolismo y</text>
      <text x="198" y="43" font-size="15" fill="#6c756f">composición corporal.</text>
    </g>
    <g transform="translate(943 807)">
      <rect width="178" height="62" rx="3" fill="#c4a84a"/>
      <text x="17" y="39" font-size="22" font-weight="750" fill="#fff">DEFENSAS</text>
      <text x="198" y="21" font-size="15" font-weight="650" fill="#111c1a">Apoyo para recuperar</text>
      <text x="198" y="43" font-size="15" fill="#6c756f">y fortalecer.</text>
    </g>
    <g transform="translate(943 1037)">
      <rect width="178" height="62" rx="3" fill="#7b9e4a"/>
      <text x="17" y="39" font-size="24" font-weight="750" fill="#fff">DETOX</text>
      <text x="198" y="21" font-size="15" font-weight="650" fill="#111c1a">Para cuando el cuerpo</text>
      <text x="198" y="43" font-size="15" fill="#6c756f">se siente cargado.</text>
    </g>
    <g transform="translate(943 1267)">
      <rect width="178" height="62" rx="3" fill="#4a5fa5"/>
      <text x="17" y="39" font-size="24" font-weight="750" fill="#fff">MENTE</text>
      <text x="198" y="21" font-size="15" font-weight="650" fill="#111c1a">Memoria, enfoque</text>
      <text x="198" y="43" font-size="15" fill="#6c756f">y claridad.</text>
    </g>
  </g>

  <!-- Product silhouettes, orderly and secondary to navigation -->
  <g fill="#fff" stroke="#d8d5cc" stroke-width="2">
    <!-- left rows -->
    <g transform="translate(230 430)">
      <rect x="0" y="25" width="54" height="70" rx="8"/><rect x="68" y="9" width="54" height="86" rx="8"/>
      <rect x="136" y="20" width="54" height="75" rx="8"/><rect x="204" y="2" width="54" height="93" rx="8"/>
      <rect x="272" y="16" width="54" height="79" rx="8"/><rect x="340" y="25" width="54" height="70" rx="8"/>
      <rect x="408" y="11" width="54" height="84" rx="8"/>
    </g>
    <g transform="translate(230 660)">
      <rect x="0" y="15" width="54" height="80" rx="8"/><rect x="68" y="27" width="54" height="68" rx="8"/>
      <rect x="136" y="8" width="54" height="87" rx="8"/><rect x="204" y="22" width="54" height="73" rx="8"/>
      <rect x="272" y="3" width="54" height="92" rx="8"/><rect x="340" y="15" width="54" height="80" rx="8"/>
    </g>
    <g transform="translate(230 890)">
      <rect x="0" y="20" width="54" height="75" rx="8"/><rect x="68" y="5" width="54" height="90" rx="8"/>
      <rect x="136" y="14" width="54" height="81" rx="8"/><rect x="204" y="28" width="54" height="67" rx="8"/>
      <rect x="272" y="8" width="54" height="87" rx="8"/><rect x="340" y="19" width="54" height="76" rx="8"/>
      <rect x="408" y="4" width="54" height="91" rx="8"/>
    </g>
    <g transform="translate(230 1120)">
      <rect x="0" y="13" width="54" height="82" rx="8"/><rect x="68" y="25" width="54" height="70" rx="8"/>
      <rect x="136" y="4" width="54" height="91" rx="8"/><rect x="204" y="17" width="54" height="78" rx="8"/>
      <rect x="272" y="8" width="54" height="87" rx="8"/>
    </g>
    <g transform="translate(230 1350)">
      <rect x="0" y="23" width="54" height="72" rx="8"/><rect x="68" y="7" width="54" height="88" rx="8"/>
      <rect x="136" y="18" width="54" height="77" rx="8"/><rect x="204" y="3" width="54" height="92" rx="8"/>
      <rect x="272" y="13" width="54" height="82" rx="8"/><rect x="340" y="26" width="54" height="69" rx="8"/>
    </g>

    <!-- right rows -->
    <g transform="translate(955 430)">
      <rect x="0" y="20" width="48" height="75" rx="8"/><rect x="60" y="7" width="48" height="88" rx="8"/>
      <rect x="120" y="16" width="48" height="79" rx="8"/><rect x="180" y="3" width="48" height="92" rx="8"/>
      <rect x="240" y="24" width="48" height="71" rx="8"/><rect x="300" y="10" width="48" height="85" rx="8"/>
    </g>
    <g transform="translate(955 660)">
      <rect x="0" y="9" width="48" height="86" rx="8"/><rect x="60" y="23" width="48" height="72" rx="8"/>
      <rect x="120" y="4" width="48" height="91" rx="8"/><rect x="180" y="17" width="48" height="78" rx="8"/>
      <rect x="240" y="27" width="48" height="68" rx="8"/>
    </g>
    <g transform="translate(955 890)">
      <rect x="0" y="18" width="48" height="77" rx="8"/><rect x="60" y="3" width="48" height="92" rx="8"/>
      <rect x="120" y="13" width="48" height="82" rx="8"/><rect x="180" y="25" width="48" height="70" rx="8"/>
      <rect x="240" y="8" width="48" height="87" rx="8"/><rect x="300" y="20" width="48" height="75" rx="8"/>
    </g>
    <g transform="translate(955 1120)">
      <rect x="0" y="4" width="48" height="91" rx="8"/><rect x="60" y="19" width="48" height="76" rx="8"/>
      <rect x="120" y="9" width="48" height="86" rx="8"/><rect x="180" y="28" width="48" height="67" rx="8"/>
      <rect x="240" y="14" width="48" height="81" rx="8"/>
    </g>
    <g transform="translate(955 1350)">
      <rect x="0" y="24" width="48" height="71" rx="8"/><rect x="60" y="10" width="48" height="85" rx="8"/>
      <rect x="120" y="2" width="48" height="93" rx="8"/><rect x="180" y="18" width="48" height="77" rx="8"/>
      <rect x="240" y="7" width="48" height="88" rx="8"/><rect x="300" y="26" width="48" height="69" rx="8"/>
    </g>
  </g>

  <!-- Minimal color-coded shelf-edge labels -->
  <g>
    <rect x="200" y="527" width="555" height="5" fill="#9b8ec4"/>
    <rect x="200" y="757" width="555" height="5" fill="#4a6fa5"/>
    <rect x="200" y="987" width="555" height="5" fill="#7bae7f"/>
    <rect x="200" y="1217" width="555" height="5" fill="#e07b39"/>
    <rect x="200" y="1447" width="555" height="5" fill="#c4715a"/>
    <rect x="925" y="527" width="405" height="5" fill="#c47fa0"/>
    <rect x="925" y="757" width="405" height="5" fill="#4a9e9b"/>
    <rect x="925" y="987" width="405" height="5" fill="#c4a84a"/>
    <rect x="925" y="1217" width="405" height="5" fill="#7b9e4a"/>
    <rect x="925" y="1447" width="405" height="5" fill="#4a5fa5"/>
  </g>

  <!-- Measurement system -->
  <g stroke="#f6f1e8" stroke-width="2" fill="none" opacity=".9">
    <path d="M175 1525V1550 M780 1525V1550 M175 1538H780"/>
    <path d="M900 1525V1550 M1355 1525V1550 M900 1538H1355"/>
    <path d="M780 1580V1605 M900 1580V1605 M780 1592H900"/>
    <path d="M1405 302H1430 M1405 1477H1430 M1418 302V1477"/>
  </g>
  <text x="477.5" y="1576" class="measure" text-anchor="middle">121 cm</text>
  <text x="1127.5" y="1576" class="measure" text-anchor="middle">91 cm</text>
  <text x="840" y="1622" class="measure" text-anchor="middle">24 cm</text>
  <text x="1460" y="900" class="measure" text-anchor="middle" transform="rotate(-90 1460 900)">235 cm</text>

  <!-- Footer -->
  <rect x="55" y="1660" width="1490" height="70" fill="#111c1a"/>
  <text x="92" y="1704" class="caps" font-size="14" fill="#f6f1e8">WELLKITT · SISTEMA DE NAVEGACIÓN POR NECESIDAD</text>
  <text x="1508" y="1704" class="font" font-size="14" text-anchor="end" fill="#9da6a1">Propuesta 01 · clínica cálida</text>
</svg>
